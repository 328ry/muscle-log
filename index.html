<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Muscle Log</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;--white:#fff;
  --gray-50:#f8f9fa;--gray-100:#f1f3f5;--gray-200:#e9ecef;--gray-300:#dee2e6;--gray-400:#adb5bd;--gray-500:#868e96;--gray-600:#495057;--gray-700:#343a40;--gray-800:#212529;
  --orange:#f05a28;--orange-light:#ff7849;--orange-dark:#d94a1e;--orange-bg:rgba(240,90,40,.06);--orange-bg2:rgba(240,90,40,.1);--orange-glow:rgba(240,90,40,.2);
  --green:#22c55e;--green-bg:rgba(34,197,94,.08);
  --blue:#3b82f6;
  --gradient:linear-gradient(135deg,#f05a28 0%,#ff7849 100%);
  --radius:14px;--radius-sm:10px;--radius-xs:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --safe-b:env(safe-area-inset-bottom,0px);
  --font:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
}
html{font-family:var(--font);background:var(--bg);color:var(--gray-800);-webkit-tap-highlight-color:transparent;font-size:15px}
body{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;padding-bottom:calc(68px + var(--safe-b));background:var(--bg)}
button{font:inherit;border:none;cursor:pointer;-webkit-appearance:none}
input{font:inherit;border:none;background:none;color:var(--gray-800)}

/* ── Header ── */
.header{background:var(--white);padding:16px 20px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-200)}
.header__brand{display:flex;align-items:center;gap:10px}
.header__icon{width:34px;height:34px;background:var(--gradient);border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px var(--orange-glow)}
.header__icon svg{width:18px;height:18px;fill:#fff}
.header h1{font-size:1.1rem;font-weight:800;letter-spacing:-.02em;color:var(--gray-800)}
.header__date{font-size:0.8rem;color:var(--gray-500);font-weight:600}

/* ── Tab bar ── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--white);border-top:1px solid var(--gray-200);padding-bottom:var(--safe-b)}
.tab-bar__inner{display:flex;max-width:430px;margin:0 auto;width:100%}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 6px;background:none;color:var(--gray-400);font-size:0.6rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;transition:color .2s}
.tab-btn svg{width:22px;height:22px;fill:currentColor;transition:transform .2s}
.tab-btn.is-active{color:var(--orange)}
.tab-btn.is-active svg{transform:scale(1.1)}

/* ── Screens ── */
.screen{display:none;flex:1;padding:12px 16px 16px;overflow-y:auto}
.screen.is-active{display:flex;flex-direction:column;gap:12px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── Today hero card ── */
.hero{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-left:4px solid var(--orange)}
.hero--rest{border-left-color:var(--gray-300)}
.hero__top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hero__day{font-size:1.15rem;font-weight:800;color:var(--gray-800)}
.hero__badge{font-size:0.65rem;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.hero__badge--upper{background:var(--orange-bg2);color:var(--orange)}
.hero__badge--lower{background:var(--green-bg);color:var(--green)}
.hero__badge--rest{background:var(--gray-100);color:var(--gray-500)}
.hero__meta{display:flex;gap:16px;font-size:0.78rem;color:var(--gray-500)}
.hero__meta strong{color:var(--gray-700)}

/* ── Progress bar ── */
.progress{background:var(--white);border-radius:var(--radius);padding:14px 20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
.progress__bar{flex:1;height:8px;background:var(--gray-100);border-radius:4px;overflow:hidden}
.progress__fill{height:100%;background:var(--gradient);border-radius:4px;transition:width .4s ease}
.progress__label{font-size:0.8rem;font-weight:700;color:var(--gray-600);white-space:nowrap}

/* ── Stats chips ── */
.stats{display:flex;gap:8px}
.stat-chip{flex:1;background:var(--white);border-radius:var(--radius-sm);padding:12px 8px;box-shadow:var(--shadow);text-align:center}
.stat-chip__value{font-size:1.1rem;font-weight:800;color:var(--orange)}
.stat-chip__label{font-size:0.6rem;color:var(--gray-500);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}

/* ── Exercise card ── */
.exercise-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px}
.exercise-card.is-done{opacity:.6}
.exercise-card__head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.exercise-card__info{flex:1;min-width:0}
.exercise-card__name{font-size:0.92rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.exercise-card__target{font-size:0.7rem;color:var(--gray-500);margin-top:2px}
.exercise-card__help{width:28px;height:28px;border-radius:50%;background:var(--gray-100);color:var(--gray-500);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800;transition:all .15s}
.exercise-card__help:active{background:var(--gray-200);transform:scale(.92)}

.set-header{display:grid;grid-template-columns:24px 1fr 1fr 38px;gap:6px;font-size:0.6rem;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;font-weight:700;padding:0 2px 4px}

.set-row{display:grid;grid-template-columns:24px 1fr 1fr 38px;gap:6px;align-items:center}
.set-row__num{font-size:0.7rem;color:var(--gray-400);text-align:center;font-weight:700}

/* Stepper input */
.stepper{display:flex;align-items:center;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-xs);overflow:hidden;height:38px}
.stepper__btn{width:32px;height:100%;background:none;color:var(--gray-500);font-size:1rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:background .15s}
.stepper__btn:active{background:var(--gray-200)}
.stepper__val{flex:1;text-align:center;font-size:0.85rem;font-weight:700;color:var(--gray-800);min-width:0;padding:0;background:none;border:none}
.stepper__val:focus{outline:none;color:var(--orange)}

.set-row__check{width:36px;height:36px;border-radius:50%;background:var(--gray-100);border:2px solid var(--gray-200);display:flex;align-items:center;justify-content:center;color:var(--gray-300);transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.set-row__check svg{width:16px;height:16px;fill:currentColor}
.set-row__check.is-done{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 2px 8px var(--orange-glow)}
.set-row__check:active:not(.is-done){transform:scale(.88)}

.btn-add-set{background:none;color:var(--orange);font-size:0.78rem;font-weight:700;padding:8px;text-align:center;width:100%}

/* ── Rest day ── */
.rest-card{background:var(--white);border-radius:var(--radius);padding:48px 24px;text-align:center;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:12px}
.rest-card__icon{font-size:3rem}
.rest-card__title{font-size:1.15rem;font-weight:800;color:var(--gray-700)}
.rest-card__desc{font-size:0.85rem;color:var(--gray-500);line-height:1.7;max-width:260px}

/* ── Complete button ── */
.btn-complete{background:var(--gradient);color:#fff;border-radius:var(--radius);padding:16px;font-size:0.95rem;font-weight:800;width:100%;letter-spacing:.02em;box-shadow:0 4px 16px var(--orange-glow);transition:all .2s;margin-top:4px}
.btn-complete:active{transform:scale(.97)}
.btn-complete:disabled{opacity:0.4;transform:none}

/* ── PR toast ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--white);border:2px solid var(--orange);color:var(--orange);padding:12px 24px;border-radius:var(--radius);font-size:0.85rem;font-weight:800;opacity:0;transition:all .4s cubic-bezier(.16,1,.3,1);z-index:300;pointer-events:none;box-shadow:var(--shadow-md)}
.toast.is-visible{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Calendar ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.cal-nav__btn{background:var(--white);border:1px solid var(--gray-200);color:var(--gray-600);border-radius:var(--radius-xs);padding:8px 16px;font-size:0.85rem;font-weight:600;box-shadow:var(--shadow);transition:all .15s}
.cal-nav__btn:active{background:var(--gray-50);transform:scale(.95)}
.cal-nav__label{font-size:1rem;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center;padding:8px 0}
.cal-grid__dow{font-size:0.6rem;color:var(--gray-400);padding:8px 0;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:0.78rem;font-weight:600;color:var(--gray-400);transition:all .15s}
.cal-cell--today{outline:2px solid var(--orange);outline-offset:-2px;color:var(--gray-800);font-weight:800}
.cal-cell--upper{background:var(--orange-bg2);color:var(--orange)}
.cal-cell--lower{background:var(--green-bg);color:var(--green)}
.cal-cell--rest{background:var(--gray-100)}
.cal-cell--empty{opacity:0}

/* ── Progress ── */
.progress-tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.progress-tabs::-webkit-scrollbar{display:none}
.progress-tab{white-space:nowrap;padding:8px 14px;border-radius:20px;background:var(--white);border:1px solid var(--gray-200);color:var(--gray-500);font-size:0.75rem;font-weight:700;flex-shrink:0;transition:all .2s;box-shadow:var(--shadow)}
.progress-tab.is-active{background:var(--gradient);border-color:transparent;color:#fff;box-shadow:0 2px 8px var(--orange-glow)}
.stat-row{display:flex;gap:8px}
.stat-box{flex:1;background:var(--white);border-radius:var(--radius-sm);padding:14px 8px;text-align:center;box-shadow:var(--shadow)}
.stat-box__value{font-size:1.2rem;font-weight:800;color:var(--orange)}
.stat-box__label{font-size:0.6rem;color:var(--gray-500);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.chart-card{background:var(--white);border-radius:var(--radius);padding:18px;flex:1;min-height:250px;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.chart-card canvas{flex:1;width:100%!important}
.chart-card__title{font-size:0.9rem;font-weight:700;margin-bottom:4px}
.chart-card__subtitle{font-size:0.7rem;color:var(--gray-500);margin-bottom:14px;font-weight:500}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.is-visible{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:430px;max-height:80dvh;overflow-y:auto;padding:24px 20px calc(24px + var(--safe-b));animation:slideUp .3s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal__title{font-size:1.05rem;font-weight:800}
.modal__close{background:var(--gray-100);color:var(--gray-500);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .15s}
.modal__close:active{background:var(--gray-200);transform:scale(.9)}
.modal p{font-size:0.85rem;line-height:1.8;color:var(--gray-600)}
.modal h3{font-size:0.88rem;font-weight:700;margin:16px 0 6px;color:var(--gray-800);display:flex;align-items:center;gap:6px}
.modal h3::before{content:'';width:3px;height:14px;background:var(--gradient);border-radius:2px;flex-shrink:0}
.modal ul{padding-left:1.2em;font-size:0.83rem;line-height:1.8;color:var(--gray-600)}

.screen::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div class="header">
  <div class="header__brand">
    <div class="header__icon"><svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43 1.43 1.43 2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/></svg></div>
    <h1>Muscle Log</h1>
  </div>
  <span class="header__date" id="headerDate"></span>
</div>

<div class="screen is-active" id="screenWorkout">
  <div id="heroCard"></div>
  <div id="progressBar"></div>
  <div id="statsChips"></div>
  <div id="exerciseList" style="display:flex;flex-direction:column;gap:10px"></div>
  <button class="btn-complete" id="btnComplete" style="display:none">ワークアウト完了</button>
</div>

<div class="screen" id="screenCalendar">
  <div class="cal-nav">
    <button class="cal-nav__btn" id="calPrev">&larr;</button>
    <span class="cal-nav__label" id="calLabel"></span>
    <button class="cal-nav__btn" id="calNext">&rarr;</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="screen" id="screenProgress">
  <div class="progress-tabs" id="progressTabs"></div>
  <div class="stat-row" id="statRow"></div>
  <div class="chart-card">
    <div class="chart-card__title" id="chartTitle"></div>
    <div class="chart-card__subtitle" id="chartSubtitle"></div>
    <canvas id="chartCanvas"></canvas>
  </div>
</div>

<div class="tab-bar"><div class="tab-bar__inner">
  <button class="tab-btn is-active" data-screen="screenWorkout">
    <svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43 1.43 1.43 2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/></svg>
    <span>Workout</span>
  </button>
  <button class="tab-btn" data-screen="screenCalendar">
    <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
    <span>Calendar</span>
  </button>
  <button class="tab-btn" data-screen="screenProgress">
    <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
    <span>Progress</span>
  </button>
</div></div>

<div class="modal-overlay" id="helpModal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="modal__title" id="helpTitle"></div>
      <button class="modal__close" id="helpClose">&times;</button>
    </div>
    <div id="helpBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
const PROGRAM = {
  upper: {
    label: '上半身の日', badge: 'UPPER BODY', badgeClass: 'hero__badge--upper',
    exercises: [
      { id:'bench_press', name:'ダンベルベンチプレス', target:'胸・肩の前・二の腕の裏', defaultSets:3, defaultWeight:6.5, defaultReps:10,
        help:{ title:'胸のプレス（ダンベルベンチプレス）', body:`<h3>どんな動き？</h3><p>ベンチに仰向けに寝て、両手のダンベルを胸の上で押し上げる動きです。胸の筋肉をメインで鍛えます。</p>
<h3>鍛えられる部位</h3><p><strong>大胸筋</strong>（胸の大きな筋肉）がメイン。肩の前側と二の腕の裏側も同時に使います。</p>
<h3>正しいやり方</h3>
<ul><li>ベンチに仰向けになり、足裏を床にしっかりつける</li><li><strong>肩甲骨を寄せて胸を張る</strong>（背中に拳1個分のアーチを作るイメージ）</li><li>ダンベルを胸の横まで下ろす（肘の角度は約90度）</li><li>息を吐きながら、まっすぐ上に押し上げる</li><li><strong>下ろすときは2〜3秒かけてゆっくり</strong>（ここが一番効く）</li></ul>
<h3>ありがちな失敗</h3>
<ul><li>肩甲骨が寄っていない → 胸ではなく肩に負荷がかかり、肩を痛めやすい</li><li>下ろしが浅い → 胸の筋肉がしっかり伸びないので効果が半減</li><li>腰を反りすぎる → 腰痛の原因になる</li></ul>
<h3>目安</h3><p>3セット × 8〜12回。「あと2回がキツい」くらいの重量がちょうどいい。</p>` } },

      { id:'one_arm_row', name:'ワンハンドロウ', target:'背中・力こぶ', defaultSets:3, defaultWeight:6.5, defaultReps:10,
        help:{ title:'背中の引き上げ（ワンハンドダンベルロウ）', body:`<h3>どんな動き？</h3><p>ベンチに片手と片膝をついて、もう片方の手でダンベルを引き上げる動きです。背中の大きな筋肉を鍛えます。</p>
<h3>鍛えられる部位</h3><p><strong>広背筋</strong>（背中の広い筋肉）と<strong>僧帽筋</strong>（背中の上部）がメイン。力こぶの筋肉も補助的に使います。</p>
<h3>正しいやり方</h3>
<ul><li>ベンチに右手と右膝をつき、左手でダンベルを持つ</li><li>背中をまっすぐ（テーブルのように平ら）にする</li><li><strong>肘を天井に引き上げるイメージ</strong>でダンベルを持ち上げる</li><li>脇腹あたりまで引いたら1秒キープ</li><li>ゆっくり下ろす</li><li>片側が終わったら反対側も同じ回数</li></ul>
<h3>ありがちな失敗</h3>
<ul><li>腕の力だけで持ち上げる → 背中に効かない。「肘を引く」意識が大事</li><li>体が回転する → 胴体は固定。動くのは腕だけ</li><li>背中が丸まる → 腰を痛める原因</li></ul>
<h3>なぜ必要？</h3><p>胸のプレスだけだと前側の筋肉ばかり発達して、猫背の原因になります。背中も鍛えることで姿勢が良くなります。</p>
<h3>目安</h3><p>左右それぞれ3セット × 8〜12回。</p>` } },

      { id:'shoulder_press', name:'ショルダープレス', target:'肩全体・二の腕の裏', defaultSets:3, defaultWeight:4.5, defaultReps:10,
        help:{ title:'肩の押し上げ（ショルダープレス）', body:`<h3>どんな動き？</h3><p>座った状態（またはベンチに背もたれを作って座り）、ダンベルを耳の横から頭上に押し上げる動きです。</p>
<h3>鍛えられる部位</h3><p><strong>三角筋</strong>（肩を覆う筋肉）全体がメイン。二の腕の裏側も補助的に使います。</p>
<h3>正しいやり方</h3>
<ul><li>ベンチに座る（背もたれがあれば寄りかかってOK）</li><li>ダンベルを耳の横に構える（肘は90度くらい）</li><li>息を吐きながら、まっすぐ上に押し上げる</li><li>腕を伸ばしきる直前で止めて、ゆっくり下ろす</li><li><strong>ダンベル同士をぶつけない</strong>（上で少し離す）</li></ul>
<h3>ありがちな失敗</h3>
<ul><li>腰を反って押し上げる → 肩ではなく胸に効いてしまう＋腰を痛める</li><li>重すぎる重量 → 肩は怪我しやすい関節。軽めから始める</li><li>下ろしが浅い → 可動域が狭いと効果が薄い</li></ul>

// Dumbbell weight ladder (per hand)
const WEIGHT_LADDER = [0, 2.5, 3.5, 4.5, 5.5, 6.5, 8, 9, 10, 11.5, 13.5, 16, 18, 20.5, 22.5, 24];

function weightUp(current) {
  for (const w of WEIGHT_LADDER) { if (w > current) return w; }
  return current;
}
function weightDown(current) {
  for (let i = WEIGHT_LADDER.length - 1; i >= 0; i--) { if (WEIGHT_LADDER[i] < current) return WEIGHT_LADDER[i]; }
  return current;
}

const BASE_DATE = new Date(2026, 2, 23);
function getDayType(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const base = new Date(BASE_DATE); base.setHours(0,0,0,0);
  const diff = Math.round((d - base) / (86400000));
  const cycle = ((diff % 4) + 4) % 4;
  return cycle === 0 ? 'upper' : cycle === 2 ? 'lower' : 'rest';
}

const STORAGE_KEY = 'muscle_log';
function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function dateKey(d) { const dt = d || new Date(); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
function getLastRecord(exId, before) {
  const data = loadData();
  for (const k of Object.keys(data).filter(k => k < before).sort().reverse())
    if (data[k]?.exercises?.[exId]) return data[k].exercises[exId];
  return null;
}

// Stats helpers
function getStreak() {
  const data = loadData(); let streak = 0; const d = new Date();
  d.setDate(d.getDate() - 1); // start from yesterday
  while (true) {
    const type = getDayType(d);
    if (type === 'rest') { d.setDate(d.getDate() - 1); continue; }
    if (data[dateKey(d)]?.completedAt) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  // Check today
  if (data[dateKey()]?.completedAt) streak++;
  return streak;
}
function getTotalSessions() {
  return Object.values(loadData()).filter(d => d.completedAt).length;
}
function getLatestPR() {
  const data = loadData(); const allEx = [...PROGRAM.upper.exercises, ...PROGRAM.lower.exercises];
  let best = null;
  for (const ex of allEx) {
    let maxW = 0;
    const keys = Object.keys(data).sort();
    for (const k of keys) {
      const sets = data[k]?.exercises?.[ex.id]?.sets;
      if (!sets) continue;
      const w = Math.max(...sets.filter(s => s.done).map(s => s.weight), 0);
      if (w > maxW && maxW > 0) best = { name: ex.name, weight: w, diff: w - maxW };
      if (w > maxW) maxW = w;
    }
  }
  return best;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('is-visible');
  setTimeout(() => el.classList.remove('is-visible'), 3000);
}

const DOW = ['日','月','火','水','木','金','土'];
function formatHeaderDate(d) { return `${d.getMonth()+1}/${d.getDate()}（${DOW[d.getDay()]}）`; }

// Tab navigation
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('is-active'));
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('is-active'));
    btn.classList.add('is-active');
    document.getElementById(btn.dataset.screen).classList.add('is-active');
    if (btn.dataset.screen === 'screenCalendar') renderCalendar();
    if (btn.dataset.screen === 'screenProgress') renderProgress();
  });
});

// Help modal
function showHelp(ex) {
  document.getElementById('helpTitle').textContent = ex.help.title;
  document.getElementById('helpBody').innerHTML = ex.help.body;
  document.getElementById('helpModal').classList.add('is-visible');
}
document.getElementById('helpClose').addEventListener('click', () => document.getElementById('helpModal').classList.remove('is-visible'));
document.getElementById('helpModal').addEventListener('click', e => { if (e.target.id === 'helpModal') document.getElementById('helpModal').classList.remove('is-visible'); });

// ── Workout ──
function renderWorkout() {
  const today = new Date(), todayKey = dateKey(today);
  document.getElementById('headerDate').textContent = formatHeaderDate(today);
  const type = getDayType(today);
  const heroEl = document.getElementById('heroCard');
  const progressEl = document.getElementById('progressBar');
  const statsEl = document.getElementById('statsChips');
  const listEl = document.getElementById('exerciseList');
  const btnComplete = document.getElementById('btnComplete');

  // Stats chips (always show)
  const streak = getStreak(), total = getTotalSessions(), pr = getLatestPR();
  statsEl.innerHTML = `<div class="stats">
    <div class="stat-chip"><div class="stat-chip__value">${streak}</div><div class="stat-chip__label">連続</div></div>
    <div class="stat-chip"><div class="stat-chip__value">${total}</div><div class="stat-chip__label">累計</div></div>
    <div class="stat-chip"><div class="stat-chip__value">${pr ? pr.weight+'kg' : '-'}</div><div class="stat-chip__label">${pr ? pr.name.slice(0,6) : '直近PR'}</div></div>
  </div>`;

  if (type === 'rest') {
    // Find next training day
    const nextDay = new Date(today);
    let nextType = 'rest';
    for (let i = 1; i <= 3; i++) {
      const d = new Date(today); d.setDate(d.getDate() + i);
      nextType = getDayType(d);
      if (nextType !== 'rest') { nextDay.setDate(today.getDate() + i); break; }
    }
    const nextProgram = PROGRAM[nextType];
    const nextLabel = `${nextDay.getMonth()+1}/${nextDay.getDate()}（${DOW[nextDay.getDay()]}）`;

    heroEl.innerHTML = `<div class="hero hero--rest"><div class="hero__top"><div class="hero__day">今日は休息日</div><span class="hero__badge hero__badge--rest">REST</span></div><div class="hero__meta"><span>筋肉は休んでいる間に成長します</span></div></div>`;
    progressEl.innerHTML = '';

    let previewHtml = `<div class="rest-card"><div class="rest-card__icon">&#128170;</div><div class="rest-card__title">次のトレーニング</div><div class="rest-card__desc">${nextLabel}　${nextProgram.label}</div></div>`;

    // Show next day's exercises as read-only preview
    previewHtml += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">';
    nextProgram.exercises.forEach(ex => {
      previewHtml += `<div class="exercise-card" style="padding:12px;opacity:.85" data-preview-ex="${ex.id}"><div class="exercise-card__head"><div class="exercise-card__info"><div class="exercise-card__name">${ex.name}</div><div class="exercise-card__target">${ex.target}</div></div><button class="exercise-card__help">?</button></div></div>`;
    });
    previewHtml += '</div>';

    listEl.innerHTML = previewHtml;
    btnComplete.style.display = 'none';

    // Attach help events to preview cards
    listEl.querySelectorAll('[data-preview-ex]').forEach(card => {
      const exId = card.dataset.previewEx;
      const ex = nextProgram.exercises.find(e => e.id === exId);
      if (ex) {
        card.querySelector('.exercise-card__help').addEventListener('click', () => showHelp(ex));
        card.querySelector('.exercise-card__name').addEventListener('click', () => showHelp(ex));
      }
    });
    return;
  }

  const program = PROGRAM[type];
  const exCount = program.exercises.length;
  heroEl.innerHTML = `<div class="hero"><div class="hero__top"><div class="hero__day">${program.label}</div><span class="hero__badge ${program.badgeClass}">${program.badge}</span></div><div class="hero__meta"><span><strong>${exCount}</strong> 種目</span><span>約 <strong>${exCount * 8}</strong> 分</span></div></div>`;
  btnComplete.style.display = '';

  const data = loadData(), todayData = data[todayKey]?.exercises || {};
  listEl.innerHTML = '';
  let doneCount = 0;

  program.exercises.forEach((ex, exIdx) => {
    const last = todayData[ex.id] || getLastRecord(ex.id, todayKey);
    const sets = last?.sets || Array.from({length: ex.defaultSets}, () => ({weight: ex.defaultWeight, reps: ex.defaultReps, done: false}));
    const allDone = sets.every(s => s.done);
    if (allDone) doneCount++;

    const card = document.createElement('div');
    card.className = 'exercise-card' + (allDone ? ' is-done' : '');
    card.innerHTML = `
      <div class="exercise-card__head"><div class="exercise-card__info"><div class="exercise-card__name">${ex.name}</div><div class="exercise-card__target">${ex.target}</div></div><button class="exercise-card__help">?</button></div>
      <div class="set-header"><span></span><span>kg</span><span>reps</span><span></span></div>
      <div class="set-list" data-ex="${ex.id}">
        ${sets.map((s, i) => renderSetRow(s, i, ex)).join('')}
      </div>
      <button class="btn-add-set" data-ex="${ex.id}">+ セット追加</button>`;
    listEl.appendChild(card);

    card.querySelector('.exercise-card__help').addEventListener('click', () => showHelp(ex));
    card.querySelector('.exercise-card__name').addEventListener('click', () => showHelp(ex));
    card.querySelector('.btn-add-set').addEventListener('click', () => {
      const setList = card.querySelector('.set-list');
      const count = setList.children.length;
      const lastSet = sets[sets.length - 1] || {weight: ex.defaultWeight, reps: ex.defaultReps};
      const row = document.createElement('div'); row.className = 'set-row'; row.dataset.set = count;
      row.innerHTML = renderSetRowInner({...lastSet, done: false}, count, ex);
      setList.appendChild(row);
      attachSetEvents(row, ex);
    });
    card.querySelectorAll('.set-row').forEach(r => attachSetEvents(r, ex));
  });

  // Progress bar
  progressEl.innerHTML = `<div class="progress"><div class="progress__bar"><div class="progress__fill" style="width:${(doneCount/exCount)*100}%"></div></div><div class="progress__label">${doneCount} / ${exCount}</div></div>`;
}

function renderSetRow(s, i, ex) {
  return `<div class="set-row" data-set="${i}">${renderSetRowInner(s, i, ex)}</div>`;
}
function renderSetRowInner(s, i, ex) {
  return `<span class="set-row__num">${i+1}</span>
    <div class="stepper"><button class="stepper__btn" data-action="dec" data-field="weight">−</button><input class="stepper__val" type="number" inputmode="decimal" value="${s.weight}" data-field="weight"><button class="stepper__btn" data-action="inc" data-field="weight">+</button></div>
    <div class="stepper"><button class="stepper__btn" data-action="dec" data-field="reps" data-step="1">−</button><input class="stepper__val" type="number" inputmode="numeric" value="${s.reps}" data-field="reps"><button class="stepper__btn" data-action="inc" data-field="reps" data-step="1">+</button></div>
    <button class="set-row__check ${s.done?'is-done':''}" data-field="done"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></button>`;
}

function attachSetEvents(row, ex) {
  row.querySelector('.set-row__check').addEventListener('click', function() {
    this.classList.toggle('is-done');
    autoSave();
    updateProgressBar();
  });
  row.querySelectorAll('.stepper__btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = btn.parentElement.querySelector('.stepper__val');
      const field = btn.dataset.field;
      let val = parseFloat(input.value) || 0;
      if (field === 'weight') {
        // Use dumbbell weight ladder
        val = btn.dataset.action === 'inc' ? weightUp(val) : weightDown(val);
      } else {
        // Reps: +/- 1
        val = btn.dataset.action === 'inc' ? val + 1 : Math.max(1, val - 1);
      }
      input.value = val;
      autoSave();
    });
  });
  row.querySelectorAll('.stepper__val').forEach(input => input.addEventListener('change', autoSave));
}

function updateProgressBar() {
  const type = getDayType(new Date());
  if (type === 'rest') return;
  const exCount = PROGRAM[type].exercises.length;
  let doneCount = 0;
  document.querySelectorAll('.set-list').forEach(list => {
    const checks = list.querySelectorAll('.set-row__check');
    if (checks.length > 0 && [...checks].every(c => c.classList.contains('is-done'))) doneCount++;
  });
  const fill = document.querySelector('.progress__fill');
  const label = document.querySelector('.progress__label');
  if (fill) fill.style.width = `${(doneCount/exCount)*100}%`;
  if (label) label.textContent = `${doneCount} / ${exCount}`;

  // Toggle card opacity
  document.querySelectorAll('.set-list').forEach(list => {
    const card = list.closest('.exercise-card');
    const checks = list.querySelectorAll('.set-row__check');
    card.classList.toggle('is-done', checks.length > 0 && [...checks].every(c => c.classList.contains('is-done')));
  });
}

function autoSave() {
  const todayKey = dateKey(), data = loadData(), type = getDayType(new Date());
  if (type === 'rest') return;
  const exercises = {};
  document.querySelectorAll('.set-list').forEach(list => {
    const sets = [];
    list.querySelectorAll('.set-row').forEach(row => {
      sets.push({ weight: parseFloat(row.querySelector('[data-field="weight"]').value) || 0, reps: parseInt(row.querySelector('[data-field="reps"]').value) || 0, done: row.querySelector('.set-row__check').classList.contains('is-done') });
    });
    exercises[list.dataset.ex] = { sets };
  });
  data[todayKey] = { type, exercises, completedAt: data[todayKey]?.completedAt || null };
  saveData(data);
}

document.getElementById('btnComplete').addEventListener('click', () => {
  autoSave();
  const data = loadData(), key = dateKey();
  if (data[key]) { data[key].completedAt = new Date().toISOString(); saveData(data); }
  showToast('ワークアウト完了! 💪');
  document.getElementById('btnComplete').disabled = true;
  setTimeout(() => { document.getElementById('btnComplete').disabled = false; renderWorkout(); }, 2500);
});

// ── Calendar ──
let calYear, calMonth;
{ const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth(); }
function renderCalendar() {
  document.getElementById('calLabel').textContent = `${calYear}年${calMonth+1}月`;
  const grid = document.getElementById('calGrid'); grid.innerHTML = '';
  DOW.forEach(d => { const el = document.createElement('div'); el.className = 'cal-grid__dow'; el.textContent = d; grid.appendChild(el); });
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const data = loadData(), today = dateKey();
  for (let i = 0; i < firstDay; i++) { const el = document.createElement('div'); el.className = 'cal-cell cal-cell--empty'; grid.appendChild(el); }
  for (let d = 1; d <= daysInMonth; d++) {
    const dt = new Date(calYear, calMonth, d), key = dateKey(dt), type = getDayType(dt), hasData = !!data[key]?.completedAt;
    let cls = 'cal-cell';
    if (key === today) cls += ' cal-cell--today';
    if (hasData && type === 'upper') cls += ' cal-cell--upper';
    else if (hasData && type === 'lower') cls += ' cal-cell--lower';
    else if (type === 'rest' && key <= today) cls += ' cal-cell--rest';
    const el = document.createElement('div'); el.className = cls; el.textContent = d; grid.appendChild(el);
  }
}
document.getElementById('calPrev').addEventListener('click', () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); });
document.getElementById('calNext').addEventListener('click', () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); });

// ── Progress ──
let chartInstance = null, currentExerciseId = null;
function getAllExercises() { return [...PROGRAM.upper.exercises, ...PROGRAM.lower.exercises]; }
function renderProgress() {
  const exercises = getAllExercises(), tabs = document.getElementById('progressTabs');
  tabs.innerHTML = '';
  if (!currentExerciseId) currentExerciseId = exercises[0].id;
  exercises.forEach(ex => {
    const btn = document.createElement('button');
    btn.className = 'progress-tab' + (ex.id === currentExerciseId ? ' is-active' : '');
    btn.textContent = ex.name;
    btn.addEventListener('click', () => { currentExerciseId = ex.id; renderProgress(); });
    tabs.appendChild(btn);
  });
  renderChart(currentExerciseId);
}
function renderChart(exId) {
  const data = loadData(), entries = [];
  Object.keys(data).sort().forEach(key => {
    const exData = data[key]?.exercises?.[exId]; if (!exData) return;
    const doneSets = exData.sets.filter(s => s.done); if (doneSets.length === 0) return;
    entries.push({ date: key, maxWeight: Math.max(...doneSets.map(s => s.weight)), totalVolume: doneSets.reduce((sum, s) => sum + s.weight * s.reps, 0) });
  });
  const exercise = getAllExercises().find(e => e.id === exId);
  document.getElementById('chartTitle').textContent = exercise?.name || '';
  const statRow = document.getElementById('statRow');
  if (entries.length === 0) {
    statRow.innerHTML = ''; document.getElementById('chartSubtitle').textContent = 'まだ記録がありません';
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; } return;
  }
  const latest = entries[entries.length - 1], best = Math.max(...entries.map(e => e.maxWeight));
  statRow.innerHTML = `<div class="stat-box"><div class="stat-box__value">${latest.maxWeight}kg</div><div class="stat-box__label">最新重量</div></div><div class="stat-box"><div class="stat-box__value">${best}kg</div><div class="stat-box__label">自己ベスト</div></div><div class="stat-box"><div class="stat-box__value">${entries.length}回</div><div class="stat-box__label">記録数</div></div>`;
  document.getElementById('chartSubtitle').textContent = `最大重量の推移`;
  const recent = entries.slice(-20), labels = recent.map(e => { const [,m,d] = e.date.split('-'); return `${parseInt(m)}/${parseInt(d)}`; });
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('chartCanvas'), {
    type: 'line', data: { labels, datasets: [{ data: recent.map(e => e.maxWeight), borderColor: '#f05a28', backgroundColor: 'rgba(240,90,40,.08)', fill: true, tension: 0.4, pointRadius: 5, pointBackgroundColor: '#f05a28', pointBorderColor: '#fff', pointBorderWidth: 2 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#adb5bd', font: { size: 10 } }, grid: { color: '#f1f3f5' } }, y: { ticks: { color: '#adb5bd', font: { size: 10 } }, grid: { color: '#f1f3f5' }, beginAtZero: false } } },
  });
}

renderWorkout();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
