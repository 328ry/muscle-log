<title>Muscle Log</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f9fc;--card:#fff;--ink:#111827;--muted:#6b7280;--soft:#eef2f7;--line:#dfe6ef;
  --blue:#1f7aec;--blue-dark:#0f63d8;--blue-soft:#eaf3ff;--green:#22c7a5;--green-soft:#e9fbf6;--orange:#f59e0b;
  --shadow:0 10px 28px rgba(15,35,70,.08),0 1px 2px rgba(15,35,70,.04);
  --shadow-strong:0 16px 38px rgba(15,35,70,.14);
  --safe-b:env(safe-area-inset-bottom,0px);
  --font:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
html{font-family:var(--font);background:linear-gradient(180deg,#fff 0%,#edf4fb 100%);color:var(--ink);-webkit-tap-highlight-color:transparent}
body{max-width:390px;margin:0 auto;min-height:100dvh;background:var(--bg);padding:0 16px calc(86px + var(--safe-b));box-shadow:0 18px 54px rgba(18,34,59,.14);overflow-x:hidden}
button,input,textarea{font:inherit}
button{border:0;background:none;cursor:pointer;color:inherit}
input,textarea{border:0;background:none;color:inherit}
.status{height:36px;display:flex;align-items:end;justify-content:space-between;padding:0 2px 8px;font-size:12px;font-weight:800;color:#111827}
.status__icons{display:flex;align-items:center;gap:5px}
.signal{width:18px;height:11px;display:grid;grid-template-columns:repeat(4,3px);align-items:end;gap:2px}
.signal span{display:block;width:3px;background:#111;border-radius:2px}.signal span:nth-child(1){height:4px}.signal span:nth-child(2){height:6px}.signal span:nth-child(3){height:8px}.signal span:nth-child(4){height:10px}
.wifi{width:14px;height:10px;border:2px solid #111;border-bottom:0;border-left-color:transparent;border-right-color:transparent;border-radius:12px 12px 0 0}
.battery{width:19px;height:9px;border:1.6px solid #111;border-radius:2px;position:relative}.battery::after{content:"";position:absolute;right:-3px;top:2px;width:2px;height:4px;background:#111;border-radius:1px}.battery::before{content:"";position:absolute;inset:1.5px 3px 1.5px 1.5px;background:#111;border-radius:1px}
.top{display:flex;align-items:center;justify-content:space-between;margin:10px 0 14px}
.top__title{font-size:22px;line-height:1.2;font-weight:900;letter-spacing:0}
.icon-btn{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#111827}
.icon-btn svg,.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.screen{display:none;flex-direction:column;gap:14px}
.screen.active{display:flex}
.card{background:var(--card);border:1px solid rgba(17,24,39,.06);border-radius:16px;box-shadow:var(--shadow)}
.summary-card{padding:18px 16px;display:grid;grid-template-columns:112px 1fr;gap:18px;align-items:center}
.ring{width:104px;height:104px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--blue) var(--ring,0deg),#e5eaf1 0);position:relative}
.ring::before{content:"";position:absolute;inset:9px;background:#fff;border-radius:50%}
.ring__inner{position:relative;text-align:center}.ring__label{font-size:11px;font-weight:800;color:var(--muted)}.ring__num{font-size:26px;font-weight:900;line-height:1}.ring__unit{font-size:12px;font-weight:800;color:var(--muted)}
.summary-lines{display:flex;flex-direction:column;gap:12px}.summary-line{display:flex;justify-content:space-between;gap:10px;font-size:12px;font-weight:800}.summary-line span{color:var(--muted)}.summary-line strong{color:#111827}
.section-title{font-size:15px;font-weight:900;margin:2px 4px 0}
.workout-list{display:flex;flex-direction:column;gap:10px}
.workout-card{min-height:86px;padding:12px 12px;display:grid;grid-template-columns:30px 62px 1fr 20px;gap:10px;align-items:center}
.check{width:22px;height:22px;border-radius:50%;border:2px solid #cbd5e1;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:900}
.check.done{background:#22c55e;border-color:#22c55e}.check.done::after{content:"✓"}
.exercise-art{height:58px;border-radius:12px;background:linear-gradient(145deg,#f7f9fc,#e9eef6);display:grid;place-items:center;color:#4b5563;font-size:28px}
.workout-card__name{font-size:15px;font-weight:900;margin-bottom:9px}.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.mini-metric{text-align:center}.mini-metric strong{display:block;font-size:12px;font-weight:900}.mini-metric span{display:block;font-size:10px;color:var(--muted);font-weight:800;margin-top:2px}
.chev{font-size:22px;color:#111827}
.empty{padding:34px 20px;text-align:center;color:var(--muted);font-size:14px;font-weight:700;line-height:1.7}
.form{display:flex;flex-direction:column;gap:16px}
.field{display:flex;flex-direction:column;gap:8px}.label{font-size:13px;font-weight:900}.input{height:42px;border:1px solid var(--line);background:#fff;border-radius:9px;padding:0 12px;font-size:14px;font-weight:700;box-shadow:inset 0 1px 2px rgba(15,35,70,.03)}textarea.input{height:58px;resize:none;padding-top:11px}
.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{background:#eef2f7;border-radius:9px;padding:8px 12px;font-size:12px;font-weight:800;color:#344054}.chip.active{background:var(--blue);color:#fff}
.number-control{display:grid;grid-template-columns:44px 1fr 44px;align-items:center;gap:12px}.round-btn{width:42px;height:42px;border:1px solid #cfd8e3;border-radius:50%;display:grid;place-items:center;font-size:27px;color:#111827;background:#fff}.big-number{text-align:center;font-size:42px;font-weight:900;color:var(--blue);line-height:1.1}
.scale{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;border:1px solid var(--line);border-radius:8px;padding:4px;background:#fff}.scale span{height:24px;display:grid;place-items:center;border-radius:5px;font-size:11px;color:var(--muted);font-weight:800}.scale span.active{background:var(--blue);color:#fff}
.set-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.set-btn{height:34px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:13px;font-weight:800}.set-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:2px}.outline-btn,.primary-btn{height:42px;border-radius:9px;font-size:14px;font-weight:900}.outline-btn{border:1.5px solid var(--blue);color:var(--blue);background:#fff}.primary-btn{background:linear-gradient(180deg,#2c8cff,#0f6fe8);color:#fff;box-shadow:0 10px 20px rgba(31,122,236,.24)}
.calendar-card{padding:14px}.month-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.month-row strong{font-size:15px}.week{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;gap:7px}.dow{font-size:11px;font-weight:800;color:var(--muted)}.day{height:34px;border-radius:50%;display:grid;place-items:center;font-size:13px;font-weight:800;position:relative;user-select:none}.day[data-date]{cursor:pointer}.day[data-date]:active{background:var(--blue-soft)}.day.active{background:var(--blue);color:#fff}.day.active[data-date]:active{background:var(--blue-dark)}.day.has::after{content:"";position:absolute;bottom:1px;width:4px;height:4px;background:var(--blue);border-radius:50%}.day.active::after{background:#fff}
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);padding:12px 0}.stats-strip div{text-align:center;border-right:1px solid #e5eaf1}.stats-strip div:last-child{border-right:0}.stats-strip strong{display:block;font-size:18px}.stats-strip span{font-size:11px;color:var(--muted);font-weight:800}
.record-list{display:flex;flex-direction:column;gap:10px}.record-card{padding:14px}.record-head{display:flex;justify-content:space-between;align-items:center}.record-head strong{font-size:14px}.record-head span{font-size:12px;color:var(--muted);font-weight:800}.record-detail{font-size:12px;color:var(--muted);font-weight:800;margin:7px 0 12px}.record-table{display:flex;flex-direction:column;gap:8px}.record-row{display:grid;grid-template-columns:1fr auto;gap:10px;font-size:12px;font-weight:800}.record-row span:last-child{color:#111827}
.range-tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.range-tabs button{height:32px;border-radius:9px;font-size:12px;font-weight:800}.range-tabs button.active{background:var(--blue);color:#fff}.chart-card{padding:16px}.chart-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}.chart-title{font-size:15px;font-weight:900}.chart-sub{font-size:12px;color:var(--muted);font-weight:800;margin-top:3px}.best-badge{border:1px solid #8ec0ff;border-radius:8px;padding:6px 10px;text-align:center;color:var(--blue);font-weight:900;font-size:13px}.best-badge span{display:block;font-size:11px}.chart-wrap{height:210px}.chart-wrap canvas{width:100%!important;height:100%!important}.summary-mini{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini-card{padding:14px}.mini-card span{font-size:12px;color:var(--muted);font-weight:800}.mini-card strong{display:block;margin-top:8px;font-size:25px;color:#16a34a}.mini-card strong.orange{color:var(--orange)}
.settings-card{padding:16px}.settings-card strong{display:block;font-size:15px;margin-bottom:8px}.settings-card p{font-size:13px;line-height:1.7;color:var(--muted);font-weight:700}
.auth-panel{display:flex;flex-direction:column;gap:10px}.auth-row{display:flex;gap:8px}.auth-row .primary-btn,.auth-row .outline-btn{flex:1}.sync-state{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:var(--blue-soft);color:var(--blue);padding:6px 10px;font-size:12px;font-weight:900}.sync-state.local{background:#eef2f7;color:#64748b}.sync-state.error{background:#fef2f2;color:#ef4444}
.tabbar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);border-top:1px solid rgba(17,24,39,.06);box-shadow:0 -12px 32px rgba(15,35,70,.09);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:6px 0 calc(6px + var(--safe-b));z-index:50}.tabbar__inner{max-width:390px;height:64px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);align-items:start;padding:0 8px}.nav-btn{width:100%;height:54px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:4px;padding-top:10px;font-size:10px;font-weight:800;color:#111827}.nav-btn.active{color:var(--blue)}.nav-btn svg{display:block;flex:0 0 auto}.nav-btn--add{position:relative;top:-16px;color:var(--blue);height:78px;padding-top:0;justify-content:flex-start;gap:3px}.nav-btn--add .plus{width:52px;height:52px;min-width:52px;min-height:52px;aspect-ratio:1/1;flex:0 0 52px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#2c8cff,#0f6fe8);box-shadow:0 10px 24px rgba(31,122,236,.35),0 0 0 7px rgba(255,255,255,.96);color:#fff;font-size:33px;font-weight:400;line-height:1;text-align:center;padding:0 0 3px}.nav-btn--add span:last-child{display:block;margin-top:0}
.toast{position:fixed;left:50%;top:52px;transform:translateX(-50%) translateY(-16px);background:#111827;color:#fff;border-radius:999px;padding:10px 16px;font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:.25s;z-index:90}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

  <section class="screen" id="settingsScreen">

</main>

<script>
const STORAGE_KEY = "muscle_log_v2";
const LEGACY_KEY = "muscle_log";
const SUPABASE_URL = "https://vqpidjrpfsyaohqddcri.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxcGlkanJwZnN5YW9ocWRkY3JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDMxMDAsImV4cCI6MjA5MDk3OTEwMH0.iLKTGiqe39AKOqY36Excbvfvoqu04_zHYSOh6kFm_mA";
const EXERCISES = ["ダンベルカール","ショルダープレス","ベンチプレス","ダンベルフライ","スクワット","ダンベルベンチプレス","ルーマニアンデッドリフト"];
const WEIGHTS = [2.5,5,7.5,10,12.5,15,17.5,20];
const REPS = [6,8,10,12,15,20,25];
const DOW = ["日","月","火","水","木","金","土"];
let state = { weight: 12, reps: 10, sets: 3, month: new Date(), activeDate: null, charts: {} };
let cloudClient = null;
let cloudUser = null;
let cloudStatus = "local";
let cloudMessage = "";
let cloudSaveTimer = null;

function keyOf(date=new Date()){ return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`; }
// Use 4am as the day boundary so late-night workouts count as the previous day's record
function todayKey(){ const d = new Date(); if (d.getHours() < 4) d.setDate(d.getDate() - 1); return keyOf(d); }
function activeKey(){ return state.activeDate || todayKey(); }
function dateLabel(key){ const d = new Date(key+"T12:00:00"); return `${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]})`; }
function loadRecords(){ migrateLegacy(); try{return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []}catch{return []} }
function saveRecords(records){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  scheduleCloudSave(records);
}
function touchRecord(record){
  record.updatedAt = new Date().toISOString();
  return record;
}
function recordTime(record){
  return Date.parse(record.updatedAt || record.updated_at || record.date + "T00:00:00") || 0;
}
function mergeRecords(localRecords, cloudRecords){
  const byDate = new Map();
  [...cloudRecords, ...localRecords].forEach(record => {
    const current = byDate.get(record.date);
    if (!current || recordTime(record) >= recordTime(current)) byDate.set(record.date, record);
  });
  return [...byDate.values()].sort((a,b) => a.date.localeCompare(b.date));
}
function migrateLegacy(){
  if (localStorage.getItem(STORAGE_KEY) || !localStorage.getItem(LEGACY_KEY)) return;
  try{
    const legacy = JSON.parse(localStorage.getItem(LEGACY_KEY));
    const records = Object.entries(legacy).map(([date,data]) => {
      const exercises = Object.entries(data.exercises || {}).map(([id,ex]) => {
        const name = EXERCISES.find(n => id.includes(n)) || id.replaceAll("_"," ");
        const done = (ex.sets || []).filter(s => s.done);
        const base = done[0] || (ex.sets || [])[0] || { weight:0, reps:0 };
        return { name, weight:Number(base.weight)||0, reps:Number(base.reps)||0, sets:done.length || (ex.sets || []).length || 1 };
      });
      return touchRecord({ id:crypto.randomUUID(), date, memo:data.memo || "", exercises });
    }).filter(r => r.exercises.length);
    if (records.length) localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }catch{}
}
function getCloudClient(){
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY || !window.supabase) return null;
  if (!cloudClient) cloudClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{ persistSession:true, autoRefreshToken:true } });
  return cloudClient;
}
function cloudErrorMessage(error){
  const raw = String(error?.message || error || "");
  const code = String(error?.code || "");
  if (/Invalid login credentials/i.test(raw)) return "メールアドレスまたはパスワードが違います";
  if (/Email not confirmed/i.test(raw)) return "確認メールの認証が必要です";
  if (/Failed to fetch|NetworkError|Load failed|fetch/i.test(raw)) return "Supabaseに接続できません。プロジェクトURLを確認してください";
  if (/relation .*muscle_log_records|muscle_log_records|42P01|PGRST/i.test(raw + code)) return "Supabase側の記録テーブルがまだ作成されていません";
  if (/row-level security|permission denied|42501/i.test(raw + code)) return "Supabase側の権限設定を確認してください";
  return raw || "同期に失敗しました";
}
function setCloudStatus(status, message=""){
  cloudStatus = status;
  cloudMessage = message;
  renderAuthPanel();
}
async function initCloud(){
  const client = getCloudClient();
  if (!client) { setCloudStatus("local"); return; }
  try {
    const { data:{ session } } = await client.auth.getSession();
    cloudUser = session?.user || null;
    if (cloudUser) {
      setCloudStatus("syncing");
      await pullCloudRecords();
      setCloudStatus("online");
    } else {
      setCloudStatus("local");
    }
    client.auth.onAuthStateChange(async (_event, session) => {
      cloudUser = session?.user || null;
      if (cloudUser) {
        try {
          setCloudStatus("syncing");
          await pullCloudRecords();
          setCloudStatus("online");
        } catch (e) {
          console.warn("Supabase auth sync failed", e);
          setCloudStatus("error", cloudErrorMessage(e));
        }
      } else {
        setCloudStatus("local");
      }
      refreshActiveScreen();
    });
  } catch (e) {
    console.warn("Supabase init failed", e);
    setCloudStatus("error", cloudErrorMessage(e));
  }
}
async function pullCloudRecords(){
  const client = getCloudClient();
  if (!client || !cloudUser) return;
  const { data, error } = await client
    .from("muscle_log_records")
    .select("id,record_date,memo,exercises,updated_at")
    .order("record_date", { ascending:true });
  if (error) { throw error; }
  const cloudRecords = (data || []).map(row => ({
    id: row.id,
    date: row.record_date,
    memo: row.memo || "",
    exercises: Array.isArray(row.exercises) ? row.exercises : [],
    updatedAt: row.updated_at || new Date().toISOString(),
  }));
  const localRecords = loadRecords();
  const merged = mergeRecords(localRecords, cloudRecords);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
  if (localRecords.length) await pushAllRecordsToCloud(merged);
  refreshActiveScreen();
}
function scheduleCloudSave(records){
  if (!cloudUser) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(() => {
    pushAllRecordsToCloud(records).catch(e => {
      console.warn("Supabase save failed", e);
      setCloudStatus("error", cloudErrorMessage(e));
    });
  }, 800);
}
async function pushAllRecordsToCloud(records = loadRecords()){
  const client = getCloudClient();
  if (!client || !cloudUser) return;
  setCloudStatus("syncing");
  const rows = records.map(record => ({
    user_id: cloudUser.id,
    record_date: record.date,
    memo: record.memo || "",
    exercises: record.exercises || [],
  }));
  if (!rows.length) { setCloudStatus("online"); return; }
  const { error } = await client
    .from("muscle_log_records")
    .upsert(rows, { onConflict:"user_id,record_date" });
  if (error) { setCloudStatus("error"); throw error; }
  setCloudStatus("online");
}
function refreshActiveScreen(){
  const active = document.querySelector(".screen.active")?.id || "homeScreen";
  if (active === "homeScreen") renderHome();
  if (active === "recordsScreen") renderRecords();
  if (active === "analyticsScreen") renderAnalytics();
  if (active === "settingsScreen") renderAuthPanel();
}
function renderAuthPanel(){
  const panel = document.getElementById("authPanel");
  if (!panel) return;
  const statusLabel = cloudStatus === "online" ? "同期中" : cloudStatus === "syncing" ? "同期処理中" : cloudStatus === "error" ? "同期エラー" : "ローカル保存";
  const statusClass = cloudStatus === "online" || cloudStatus === "syncing" ? "" : cloudStatus === "error" ? "error" : "local";
  const messageHtml = cloudMessage ? `<p>${escapeHtml(cloudMessage)}</p>` : "";
  if (cloudUser) {
    panel.innerHTML = `<div><span class="sync-state ${statusClass}">${statusLabel}</span></div><p>${escapeHtml(cloudUser.email || "ログイン中")}</p>${messageHtml}<div class="auth-row"><button class="outline-btn" id="syncNow" type="button">今すぐ同期</button><button class="outline-btn" id="cloudLogout" type="button">ログアウト</button></div>`;
    document.getElementById("syncNow").onclick = () => pullCloudRecords().then(() => pushAllRecordsToCloud()).then(() => toast("同期しました")).catch(e => { const message = cloudErrorMessage(e); setCloudStatus("error", message); toast(message); });
    document.getElementById("cloudLogout").onclick = async () => { const client = getCloudClient(); if (client) await client.auth.signOut(); cloudUser = null; setCloudStatus("local"); };
    return;
  }
  panel.innerHTML = `<div><span class="sync-state ${statusClass}">${statusLabel}</span></div>
    ${messageHtml}
    <p>メールアドレスとパスワードでログインすると、複数端末で同じ記録を同期できます。</p>
    <input class="input" id="cloudEmail" type="email" placeholder="メールアドレス">
    <input class="input" id="cloudPassword" type="password" placeholder="パスワード">
    <div class="auth-row"><button class="primary-btn" id="cloudLogin" type="button">ログイン</button><button class="outline-btn" id="cloudSignup" type="button">新規登録</button></div>`;
  document.getElementById("cloudLogin").onclick = () => cloudAuth("login");
  document.getElementById("cloudSignup").onclick = () => cloudAuth("signup");
}
async function cloudAuth(mode){
  const email = document.getElementById("cloudEmail").value.trim();
  const password = document.getElementById("cloudPassword").value;
  if (!email || !password) { toast("メールアドレスとパスワードを入力してください"); return; }
  const client = getCloudClient();
  if (!client) { toast("Supabaseの読み込みに失敗しました"); return; }
  setCloudStatus("syncing");
  let result;
  try {
    result = mode === "signup"
      ? await client.auth.signUp({ email, password })
      : await client.auth.signInWithPassword({ email, password });
  } catch (e) {
    const message = cloudErrorMessage(e);
    setCloudStatus("error", message);
    toast(message);
    return;
  }
  if (result.error) { const message = cloudErrorMessage(result.error); setCloudStatus("error", message); toast(message); return; }
  cloudUser = result.data.user || result.data.session?.user || null;
  if (cloudUser) {
    try {
      await pushAllRecordsToCloud();
      await pullCloudRecords();
      setCloudStatus("online");
      toast(mode === "signup" ? "登録しました" : "ログインしました");
    } catch (e) {
      const message = cloudErrorMessage(e);
      setCloudStatus("error", message);
      toast(message);
    }
  } else {
    setCloudStatus("local");
    toast("確認メールが必要な可能性があります");
  }
  refreshActiveScreen();
}
function totals(record){
  return record.exercises.reduce((a,e)=>{ a.sets += e.sets; a.reps += e.reps * e.sets; a.volume += e.weight * e.reps * e.sets; return a; }, {sets:0,reps:0,volume:0});
}
function todayRecord(){ return loadRecords().find(r => r.date === todayKey()); }
function activeRecord(){ return loadRecords().find(r => r.date === activeKey()); }
function switchScreen(name){
  if (name === "add" && !state.activeDate) state.activeDate = todayKey();
  if (name !== "add") state.activeDate = null;
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(`${name}Screen`).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.screen === name));
  const addTitle = state.activeDate && state.activeDate !== todayKey() ? `${dateLabel(state.activeDate)}の記録` : "記録を追加";
  const titles = { home:"今日の記録", add:addTitle, records:"記録", analytics:"成長の見える化", settings:"設定" };
  document.getElementById("screenTitle").textContent = titles[name];
  if (name === "home") renderHome();
  if (name === "add") renderAdd();
  if (name === "records") renderRecords();
  if (name === "analytics") renderAnalytics();
  if (name === "settings") renderAuthPanel();
}
const SET_GOAL = 10;
function renderHome(){
  const record = todayRecord();
  const exercises = record?.exercises || [];
  const t = record ? totals(record) : {sets:0,reps:0,volume:0};
  const ratio = Math.min(1, t.sets / SET_GOAL);
  document.getElementById("ringCount").textContent = `${t.sets}/${SET_GOAL}`;
  document.getElementById("progressRing").style.setProperty("--ring", `${ratio * 360}deg`);
  document.getElementById("todayProgress").textContent = `${Math.round(ratio * 100)}%`;
  document.getElementById("todaySets").textContent = `${t.sets} set`;
  document.getElementById("todayReps").textContent = `${t.reps} rep`;
  document.getElementById("todayCalories").textContent = `${Math.round(t.volume / 5)} kcal`;
  const list = document.getElementById("todayList");
  if (!record) {
    list.innerHTML = `<div class="card empty">まだ今日の記録がありません。<br>中央の「追加」から記録できます。</div>`;
    return;
  }
  list.innerHTML = exercises.map((e,i) => workoutCard(e,i,true)).join("");
}
function workoutCard(e,i,done=false){
  const art = ["🏋️","💪","🏃","📈"][i % 4];
  return `<div class="card workout-card"><div class="check ${done ? "done" : ""}"></div><div class="exercise-art">${art}</div><div><div class="workout-card__name">${escapeHtml(e.name)}</div><div class="metric-row"><div class="mini-metric"><strong>${e.weight}kg</strong><span>重量</span></div><div class="mini-metric"><strong>${e.reps}回</strong><span>回数</span></div><div class="mini-metric"><strong>${e.sets}セット</strong><span>セット</span></div></div></div><div class="chev">›</div></div>`;
}
function renderAdd(){
  document.getElementById("exerciseOptions").innerHTML = EXERCISES.map(e => `<option value="${e}"></option>`).join("");
  document.getElementById("recentChips").innerHTML = EXERCISES.slice(0,5).map(e => `<button class="chip" type="button" data-name="${e}">${e}</button>`).join("");
  document.querySelectorAll("[data-name]").forEach(b => b.onclick = () => { document.getElementById("exerciseName").value = b.dataset.name; document.querySelectorAll("[data-name]").forEach(c => c.classList.toggle("active", c === b)); });
  renderNumberControls();
}
function renderNumberControls(){
  document.getElementById("weightValue").textContent = state.weight.toFixed(1);
  document.getElementById("repsValue").textContent = state.reps;
  document.getElementById("weightScale").innerHTML = WEIGHTS.map(w => `<span class="${Math.abs(w-state.weight)<.1 ? "active" : ""}" data-weight="${w}">${w}</span>`).join("");
  document.getElementById("repsScale").innerHTML = REPS.map(r => `<span class="${r===state.reps ? "active" : ""}" data-reps="${r}">${r}</span>`).join("");
  document.getElementById("setGrid").innerHTML = [1,2,3,4,5].map(s => `<button class="set-btn ${s===state.sets ? "active" : ""}" type="button" data-sets="${s}">${s}</button>`).join("");
  document.querySelectorAll("[data-weight]").forEach(el => el.onclick = () => { state.weight = Number(el.dataset.weight); renderNumberControls(); });
  document.querySelectorAll("[data-reps]").forEach(el => el.onclick = () => { state.reps = Number(el.dataset.reps); renderNumberControls(); });
  document.querySelectorAll("[data-sets]").forEach(el => el.onclick = () => { state.sets = Number(el.dataset.sets); renderNumberControls(); });
}
function saveExercise({stay=false}={}){
  const input = document.getElementById("exerciseName");
  const name = input.value.trim() || "ダンベルカール";
  const records = loadRecords();
  const date = activeKey();
  let record = records.find(r => r.date === date);
  if (!record) { record = { id:crypto.randomUUID(), date, memo:"", exercises:[] }; records.push(record); }
  record.exercises.push({ name, weight:state.weight, reps:state.reps, sets:state.sets });
  record.memo = document.getElementById("memoInput").value.trim();
  touchRecord(record);
  saveRecords(records);
  input.value = ""; document.getElementById("memoInput").value = "";
  toast(date === todayKey() ? "保存しました" : `${dateLabel(date)}に保存しました`);
  if (!stay) { state.activeDate = null; switchScreen("home"); }
}
function renderRecords(){
  renderCalendar();
  const records = loadRecords().sort((a,b)=>b.date.localeCompare(a.date));
  const total = records.reduce((a,r)=>{ const t=totals(r); a.ex += r.exercises.length; a.sets += t.sets; return a; }, {ex:0,sets:0});
  document.getElementById("recordDays").textContent = `${records.length}日`;
  document.getElementById("recordExercises").textContent = `${total.ex}種目`;
  document.getElementById("recordSets").textContent = `${total.sets}セット`;
  const list = document.getElementById("recordList");
  if (!records.length) { list.innerHTML = `<div class="card empty">まだ記録がありません。</div>`; return; }
  list.innerHTML = records.map(r => {
    const t = totals(r);
    return `<div class="card record-card"><div class="record-head"><strong>${dateLabel(r.date)}　${dayType(r)}</strong><span>⌄</span></div><div class="record-detail">合計 ${r.exercises.length}種目　${t.sets}セット　${t.reps}レップ</div><div class="record-table">${r.exercises.map(e => `<div class="record-row"><span>${escapeHtml(e.name)}</span><span>${e.weight}kg × ${e.reps}回 × ${e.sets}セット</span></div>`).join("")}</div></div>`;
  }).join("");
}
function renderCalendar(){
  const d = state.month;
  const year = d.getFullYear(), month = d.getMonth();
  document.getElementById("monthLabel").textContent = `${year}年${month+1}月`;
  const records = new Set(loadRecords().map(r => r.date));
  const first = new Date(year, month, 1).getDay();
  const days = new Date(year, month+1, 0).getDate();
  const today = todayKey();
  const todayDate = new Date(today + "T12:00:00");
  let html = DOW.map(x => `<div class="dow">${x}</div>`).join("");
  for (let i=0;i<first;i++) html += `<div></div>`;
  for (let day=1;day<=days;day++){
    const cellDate = new Date(year, month, day);
    const key = keyOf(cellDate);
    const future = cellDate > todayDate;
    html += `<div class="day ${key===today ? "active" : ""} ${records.has(key) ? "has" : ""}" ${future ? "" : `data-date="${key}"`}>${day}</div>`;
  }
  const grid = document.getElementById("calendarGrid");
  grid.innerHTML = html;
  grid.querySelectorAll("[data-date]").forEach(el => el.onclick = () => {
    state.activeDate = el.dataset.date;
    switchScreen("add");
  });
}
function renderAnalytics(){
  const records = loadRecords().sort((a,b)=>a.date.localeCompare(b.date));
  const points = records.map(r => {
    const flat = r.exercises;
    const maxWeight = flat.length ? Math.max(...flat.map(e => e.weight)) : 0;
    const curl = curlMetrics(r);
    return { label:dateLabel(r.date).split("(")[0], maxWeight, curlScore: curl.score, curlReps: curl.reps };
  }).slice(-7);
  const labels = points.map(p => p.label);
  const weights = points.map(p => p.maxWeight);
  const curlScores = points.map(p => p.curlScore);
  const bestW = weights.length ? Math.max(...weights) : 0;
  const bestScore = curlScores.length ? Math.max(...curlScores) : 0;
  document.getElementById("bestWeight").textContent = `${bestW}kg`;
  document.getElementById("bestCurlScore").textContent = `${Math.round(bestScore)}pt`;
  document.getElementById("weightChartTitle").textContent = mostRecentExercise() || "ダンベルカール";
  document.getElementById("monthGrowth").textContent = weights.length >= 2 && weights[0] ? `+${Math.round((weights.at(-1)-weights[0])/weights[0]*100)}%` : "+0%";
  document.getElementById("prCount").textContent = `${countPr(records)}回`;
  drawChart("weightChart","line",labels,weights,varColor("--blue"),"rgba(31,122,236,.08)");
  drawChart("curlScoreChart","bar",labels,curlScores,varColor("--green"),"rgba(34,199,165,.75)");
}
function drawChart(id,type,labels,data,border,background){
  if (state.charts[id]) state.charts[id].destroy();
  const ctx = document.getElementById(id);
  state.charts[id] = new Chart(ctx,{type,data:{labels,datasets:[{data,borderColor:border,backgroundColor:background,fill:type==="line",tension:.38,borderWidth:3,pointRadius:type==="line"?4:0,pointBackgroundColor:border,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:"#8a94a6",font:{size:11,weight:"700"}}},y:{grid:{color:"#eef2f7"},ticks:{color:"#8a94a6",font:{size:11,weight:"700"}},beginAtZero:false}}}});
}
function dayType(r){ return r.exercises.some(e => /スクワット|デッド|脚/.test(e.name)) ? "脚の日" : r.exercises.some(e => /ロウ|背中/.test(e.name)) ? "背中の日" : "胸・腕の日"; }
function curlMetrics(record){
  return record.exercises.filter(e => /カール|curl/i.test(e.name)).reduce((acc,e) => {
    const reps = e.reps * e.sets;
    acc.reps += reps;
    acc.score += e.weight * reps;
    return acc;
  }, { reps:0, score:0 });
}
function mostRecentExercise(){ const r = loadRecords().sort((a,b)=>b.date.localeCompare(a.date))[0]; return r?.exercises?.[0]?.name; }
function countPr(records){ let best=0,count=0; records.forEach(r => r.exercises.forEach(e => { if(e.weight>best){ if(best>0) count++; best=e.weight; } })); return count; }
function varColor(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
function escapeHtml(v){ return String(v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){ const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),1800); }

document.querySelectorAll(".nav-btn").forEach(btn => btn.onclick = () => switchScreen(btn.dataset.screen));
document.querySelectorAll("[data-step-weight]").forEach(b => b.onclick = () => { state.weight = Math.max(0, +(state.weight + Number(b.dataset.stepWeight) * .5).toFixed(1)); renderNumberControls(); });
document.querySelectorAll("[data-step-reps]").forEach(b => b.onclick = () => { state.reps = Math.max(1, state.reps + Number(b.dataset.stepReps)); renderNumberControls(); });
document.getElementById("saveRecord").onclick = () => saveExercise();
document.getElementById("addAnother").onclick = () => saveExercise({stay:true});
document.getElementById("prevMonth").onclick = () => { state.month.setMonth(state.month.getMonth()-1); renderRecords(); };
document.getElementById("nextMonth").onclick = () => { state.month.setMonth(state.month.getMonth()+1); renderRecords(); };
document.getElementById("topAction").onclick = () => switchScreen("settings");

switchScreen("home");
initCloud();
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
