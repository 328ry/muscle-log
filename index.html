<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f7f9fc">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Muscle Log</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f9fc;--card:#fff;--ink:#111827;--muted:#6b7280;--soft:#eef2f7;--line:#dfe6ef;
  --blue:#1f7aec;--blue-dark:#0f63d8;--blue-soft:#eaf3ff;--green:#22c7a5;--green-soft:#e9fbf6;--orange:#f59e0b;
  --shadow:0 10px 28px rgba(15,35,70,.08),0 1px 2px rgba(15,35,70,.04);
  --shadow-strong:0 16px 38px rgba(15,35,70,.14);
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --font:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
html{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent}
body{max-width:390px;margin:0 auto;min-height:100dvh;background:var(--bg);padding:var(--safe-t) 16px calc(86px + var(--safe-b));box-shadow:0 18px 54px rgba(18,34,59,.14);overflow-x:hidden}
button,input,textarea{font:inherit}
button{border:0;background:none;cursor:pointer;color:inherit}
input,textarea{border:0;background:none;color:inherit}
.top{display:flex;align-items:center;justify-content:space-between;margin:18px 0 14px}
.top__title{font-size:22px;line-height:1.2;font-weight:900;letter-spacing:0}
.icon-btn{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#111827}
.icon-btn svg,.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.screen{display:none;flex-direction:column;gap:14px}
.screen.active{display:flex}
.card{background:var(--card);border:1px solid rgba(17,24,39,.06);border-radius:16px;box-shadow:var(--shadow)}
.summary-card{padding:18px 16px;display:grid;grid-template-columns:112px 1fr;gap:18px;align-items:center}
.ring{width:104px;height:104px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--blue) var(--ring,0deg),#e5eaf1 0);position:relative}
.ring::before{content:"";position:absolute;inset:9px;background:#fff;border-radius:50%}
.ring__inner{position:relative;text-align:center}.ring__label{font-size:11px;font-weight:800;color:var(--muted)}.ring__num{font-size:26px;font-weight:900;line-height:1}.ring__unit{font-size:12px;font-weight:800;color:var(--muted)}
.summary-lines{display:flex;flex-direction:column;gap:12px}.summary-line{display:flex;justify-content:space-between;gap:10px;font-size:12px;font-weight:800}.summary-line span{color:var(--muted)}.summary-line strong{color:#111827}
.section-title{font-size:15px;font-weight:900;margin:2px 4px 0}
.workout-list{display:flex;flex-direction:column;gap:10px}
.workout-card{min-height:86px;padding:12px 12px;display:grid;grid-template-columns:30px 62px 1fr 20px;gap:10px;align-items:center}
.check{width:22px;height:22px;border-radius:50%;border:2px solid #cbd5e1;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:900}
.check.done{background:#22c55e;border-color:#22c55e}.check.done::after{content:"✓"}
.exercise-art{height:58px;border-radius:12px;background:linear-gradient(145deg,#f7f9fc,#e9eef6);display:grid;place-items:center;color:#4b5563;font-size:28px}
.workout-card__name{font-size:15px;font-weight:900;margin-bottom:9px}.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.mini-metric{text-align:center}.mini-metric strong{display:block;font-size:12px;font-weight:900}.mini-metric span{display:block;font-size:10px;color:var(--muted);font-weight:800;margin-top:2px}
.chev{font-size:22px;color:#111827}
.empty{padding:34px 20px;text-align:center;color:var(--muted);font-size:14px;font-weight:700;line-height:1.7}
.form{display:flex;flex-direction:column;gap:16px}
.field{display:flex;flex-direction:column;gap:8px}.label{font-size:13px;font-weight:900}.input{height:42px;border:1px solid var(--line);background:#fff;border-radius:9px;padding:0 12px;font-size:14px;font-weight:700;box-shadow:inset 0 1px 2px rgba(15,35,70,.03)}textarea.input{height:58px;resize:none;padding-top:11px}
.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{background:#eef2f7;border-radius:9px;padding:8px 12px;font-size:12px;font-weight:800;color:#344054}.chip.active{background:var(--blue);color:#fff}
.number-control{display:grid;grid-template-columns:44px 1fr 44px;align-items:center;gap:12px}.round-btn{width:42px;height:42px;border:1px solid #cfd8e3;border-radius:50%;display:grid;place-items:center;font-size:27px;color:#111827;background:#fff}.big-number{text-align:center;font-size:42px;font-weight:900;color:var(--blue);line-height:1.1}
.scale{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:4px;border:1px solid var(--line);border-radius:8px;padding:4px;background:#fff}.scale span{height:26px;display:grid;place-items:center;border-radius:5px;font-size:11px;color:var(--muted);font-weight:800;cursor:pointer}.scale span.active{background:var(--blue);color:#fff}
.set-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.set-btn{height:34px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:13px;font-weight:800}.set-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:2px}.outline-btn,.primary-btn{height:42px;border-radius:9px;font-size:14px;font-weight:900}.outline-btn{border:1.5px solid var(--blue);color:var(--blue);background:#fff}.primary-btn{background:linear-gradient(180deg,#2c8cff,#0f6fe8);color:#fff;box-shadow:0 10px 20px rgba(31,122,236,.24)}
.calendar-card{padding:14px}.month-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.month-row strong{font-size:15px}.week{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;gap:7px;justify-items:center}.dow{font-size:11px;font-weight:800;color:var(--muted)}.day{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:13px;font-weight:800;position:relative;user-select:none}.day[data-date]{cursor:pointer}.day[data-date]:active{background:var(--blue-soft)}.day.active{background:var(--blue);color:#fff}.day.active[data-date]:active{background:var(--blue-dark)}.day.has::after{content:"";position:absolute;bottom:1px;width:4px;height:4px;background:var(--blue);border-radius:50%}.day.active::after{background:#fff}
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);padding:12px 0}.stats-strip div{text-align:center;border-right:1px solid #e5eaf1}.stats-strip div:last-child{border-right:0}.stats-strip strong{display:block;font-size:18px}.stats-strip span{font-size:11px;color:var(--muted);font-weight:800}
.record-list{display:flex;flex-direction:column;gap:10px}.record-card{padding:14px}.record-head{display:flex;justify-content:space-between;align-items:center}.record-head strong{font-size:14px}.record-head span{font-size:12px;color:var(--muted);font-weight:800}.record-detail{font-size:12px;color:var(--muted);font-weight:800;margin:7px 0 12px}.record-table{display:flex;flex-direction:column;gap:8px}.record-row{display:grid;grid-template-columns:1fr auto;gap:10px;font-size:12px;font-weight:800}.record-row span:last-child{color:#111827}
.analytics-menu-card{padding:14px}.analytics-menu-card .chips{max-height:none}.chart-card{padding:16px}.chart-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}.chart-title{font-size:15px;font-weight:900}.chart-sub{font-size:12px;color:var(--muted);font-weight:800;margin-top:3px}.best-badge{border:1px solid #8ec0ff;border-radius:8px;padding:6px 10px;text-align:center;color:var(--blue);font-weight:900;font-size:13px}.best-badge span{display:block;font-size:11px}.chart-wrap{height:210px}.chart-wrap canvas{width:100%!important;height:100%!important}.summary-mini{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini-card{padding:14px}.mini-card span{font-size:12px;color:var(--muted);font-weight:800}.mini-card strong{display:block;margin-top:8px;font-size:25px;color:#16a34a}.mini-card strong.orange{color:var(--orange)}
.settings-card{padding:16px}.settings-card strong{display:block;font-size:15px;margin-bottom:8px}.settings-card p{font-size:13px;line-height:1.7;color:var(--muted);font-weight:700}
.auth-panel{display:flex;flex-direction:column;gap:10px}.auth-row{display:flex;gap:8px}.auth-row .primary-btn,.auth-row .outline-btn{flex:1}.sync-state{display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:var(--blue-soft);color:var(--blue);padding:6px 10px;font-size:12px;font-weight:900}.sync-state.local{background:#eef2f7;color:#64748b}.sync-state.error{background:#fef2f2;color:#ef4444}
.tabbar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.95);border-top:1px solid rgba(17,24,39,.06);box-shadow:0 -12px 32px rgba(15,35,70,.09);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:6px 0 calc(6px + var(--safe-b));z-index:50}.tabbar__inner{max-width:390px;height:64px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);align-items:start;padding:0 8px}.nav-btn{width:100%;height:54px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:4px;padding-top:10px;font-size:10px;font-weight:800;color:#111827}.nav-btn.active{color:var(--blue)}.nav-btn svg{display:block;flex:0 0 auto}.nav-btn--add{position:relative;top:-16px;color:var(--blue);height:78px;padding-top:0;justify-content:flex-start;gap:3px}.nav-btn--add .plus{width:52px;height:52px;min-width:52px;min-height:52px;aspect-ratio:1/1;flex:0 0 52px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#2c8cff,#0f6fe8);box-shadow:0 10px 24px rgba(31,122,236,.35),0 0 0 7px rgba(255,255,255,.96);color:#fff;font-size:33px;font-weight:400;line-height:1;text-align:center;padding:0 0 3px}.nav-btn--add span:last-child{display:block;margin-top:0}
.toast{position:fixed;left:50%;top:52px;transform:translateX(-50%) translateY(-16px);background:#111827;color:#fff;border-radius:999px;padding:10px 16px;font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:.25s;z-index:90}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.workout-card[data-edit]{cursor:pointer}.workout-card[data-edit]:active{background:#f4f7fb}
.sheet-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.45);opacity:0;pointer-events:none;transition:.2s;z-index:80}.sheet-backdrop.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:390px;margin:0 auto;background:#fff;border-radius:18px 18px 0 0;padding:20px 18px calc(18px + var(--safe-b));box-shadow:0 -18px 44px rgba(15,35,70,.18);transform:translateY(100%);transition:.25s;z-index:81}.sheet.open{transform:translateY(0)}
.sheet__head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.sheet__title{font-size:16px;font-weight:900}.sheet__close{font-size:22px;color:#111827;background:none;border:0;line-height:1}
.sheet__row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.sheet__field{display:flex;flex-direction:column;gap:6px;min-width:0}.sheet__field label{font-size:12px;font-weight:800;color:var(--muted)}.sheet__field input{width:100%;min-width:0;height:40px;border:1px solid var(--line);background:#fff;border-radius:9px;padding:0 12px;font-size:14px;font-weight:700}
.sheet__actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.danger-btn{height:42px;border:1.5px solid #fca5a5;color:#ef4444;background:#fff;border-radius:9px;font-size:14px;font-weight:900}
.date-field{margin-top:-2px}.date-field .muted-label{font-size:12px;color:var(--muted);font-weight:800}.date-field .input{height:36px;font-size:13px;color:#374151}.date-hint{font-size:11px;color:var(--muted);font-weight:700;margin-top:-2px}.date-hint.past{color:var(--blue);font-weight:900}
.exercise-info{display:none;margin-top:6px;padding:10px 12px;border-radius:10px;background:var(--blue-soft);font-size:12px;font-weight:700;color:#1e3a8a;line-height:1.5}.exercise-info.show{display:flex;flex-direction:column;gap:6px}.exercise-info .target{display:flex;gap:6px;align-items:center}.exercise-info .help-link{align-self:flex-start;color:var(--blue);font-weight:900;font-size:12px;text-decoration:underline;background:none;border:0;padding:0;cursor:pointer}
.menu-hint{font-size:11px;color:var(--muted);font-weight:700;margin-top:6px}
.menu-manage{display:flex;flex-direction:column;gap:8px;margin-top:6px}.menu-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff}.menu-row__main{min-width:0}.menu-row__name{font-size:13px;font-weight:900;color:#111827;line-height:1.3}.menu-row__sub{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}.menu-row__badge{align-self:start;background:#eef2f7;color:#64748b;border-radius:6px;padding:3px 7px;font-size:10px;font-weight:900}.menu-row__delete{background:none;border:0;color:#ef4444;font-size:12px;font-weight:900;padding:6px 8px;cursor:pointer}
.sheet--scroll{max-height:80vh;overflow-y:auto}.help-body{font-size:13px;line-height:1.7;color:#1f2937}.help-body h3{font-size:13px;font-weight:900;color:var(--blue);margin:14px 0 4px}.help-body h3:first-child{margin-top:0}.help-body p{margin:0 0 8px}.help-body ul{margin:0 0 8px;padding-left:18px}.help-body li{margin-bottom:3px}.help-body strong{color:#0f172a;font-weight:900}
</style>
</head>
<body>
<header class="top">
  <div><h1 class="top__title" id="screenTitle">今日の記録</h1></div>
  <button class="icon-btn" id="topAction" type="button" aria-label="設定"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></button>
</header>

<main>
  <section class="screen active" id="homeScreen">
    <div class="card summary-card">
      <div class="ring" id="progressRing"><div class="ring__inner"><div class="ring__label">完了</div><div class="ring__num" id="ringCount">0/0</div><div class="ring__unit">セット</div></div></div>
      <div class="summary-lines">
        <div class="summary-line"><span>今日の進捗</span><strong id="todayProgress">0%</strong></div>
        <div class="summary-line"><span>総セット数</span><strong id="todaySets">0 set</strong></div>
        <div class="summary-line"><span>総レップ数</span><strong id="todayReps">0 rep</strong></div>
        <div class="summary-line"><span>推定消費カロリー</span><strong id="todayCalories">0 kcal</strong></div>
      </div>
    </div>
    <h2 class="section-title">今日のトレーニングメニュー</h2>
    <div class="workout-list" id="todayList"></div>
  </section>

  <section class="screen" id="addScreen">
    <div class="form">
      <div class="field"><div class="label">メニューを選択</div><div class="chips" id="recentChips"></div><div class="exercise-info" id="exerciseInfo"></div><div class="menu-hint">設定画面の「メニュー管理」から自分のメニューを追加できます。</div></div>
      <div class="field"><div class="label">重量 (kg)</div><div class="number-control"><button class="round-btn" data-step-weight="-1" type="button">−</button><div class="big-number" id="weightValue">12.0</div><button class="round-btn" data-step-weight="1" type="button">＋</button></div><div class="scale" id="weightScale"></div></div>
      <div class="field"><div class="label">回数 (回)</div><div class="number-control"><button class="round-btn" data-step-reps="-1" type="button">−</button><div class="big-number" id="repsValue">10</div><button class="round-btn" data-step-reps="1" type="button">＋</button></div><div class="scale" id="repsScale"></div></div>
      <div class="field"><div class="label">セット数</div><div class="set-grid" id="setGrid"></div></div>
      <div class="field"><label class="label" for="memoInput">メモ（任意）</label><textarea class="input" id="memoInput" placeholder="フォームや感想などをメモできます"></textarea></div>
      <div class="field date-field"><label class="label muted-label" for="addDate">追加日付</label><input class="input" id="addDate" type="date"><div class="date-hint" id="addDateHint">当日</div></div>
      <div class="actions"><button class="outline-btn" id="addAnother" type="button">＋ 種目を追加</button><button class="primary-btn" id="saveRecord" type="button">保存する</button></div>
    </div>
  </section>

  <section class="screen" id="recordsScreen">
    <div class="card calendar-card"><div class="month-row"><button id="prevMonth" type="button">‹</button><strong id="monthLabel"></strong><button id="nextMonth" type="button">›</button></div><div class="week" id="calendarGrid"></div></div>
    <div class="card stats-strip"><div><strong id="recordDays">0日</strong><span>記録日数</span></div><div><strong id="recordExercises">0種目</strong><span>総種目数</span></div><div><strong id="recordSets">0セット</strong><span>総セット数</span></div></div>
    <div class="record-list" id="recordList"></div>
  </section>

  <section class="screen" id="analyticsScreen">
    <div class="card analytics-menu-card"><div class="label" style="margin-bottom:8px">メニューを選択</div><div class="chips" id="analyticsMenuChips"></div></div>
    <div class="card chart-card"><div class="chart-head"><div><div class="chart-title" id="weightChartTitle">—</div><div class="chart-sub">最大重量の推移 (kg)</div></div><div class="best-badge"><span>自己ベスト</span><strong id="bestWeight">0kg</strong></div></div><div class="chart-wrap"><canvas id="weightChart"></canvas></div></div>
    <div class="card chart-card"><div class="chart-head"><div><div class="chart-title" id="volumeChartTitle">—</div><div class="chart-sub">総ボリューム（重量 × 回数 × セット）</div></div><div class="best-badge"><span>最高ボリューム</span><strong id="bestVolume">0</strong></div></div><div class="chart-wrap"><canvas id="volumeChart"></canvas></div></div>
    <div class="summary-mini"><div class="card mini-card"><span>先月比（最大重量）</span><strong id="monthGrowth">+0%</strong></div><div class="card mini-card"><span>自己ベスト更新</span><strong class="orange" id="prCount">0回</strong></div></div>
  </section>

  <section class="screen" id="settingsScreen">
    <div class="card settings-card"><strong>メニュー管理</strong><div class="menu-manage" id="menuManage"></div><button class="primary-btn" id="addMenuOpen" type="button" style="margin-top:12px">＋ 新しいメニューを追加</button></div>
    <div class="card settings-card"><strong>同期</strong><div class="auth-panel" id="authPanel"></div></div>
  </section>
</main>

<nav class="tabbar"><div class="tabbar__inner">
  <button class="nav-btn active" data-screen="home" type="button"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"></path><path d="M5 10v10h14V10"></path></svg><span>ホーム</span></button>
  <button class="nav-btn" data-screen="records" type="button"><svg viewBox="0 0 24 24"><path d="M8 2v4"></path><path d="M16 2v4"></path><rect x="4" y="4" width="16" height="18" rx="2"></rect><path d="M8 11h8"></path><path d="M8 15h5"></path></svg><span>記録</span></button>
  <button class="nav-btn nav-btn--add" data-screen="add" type="button"><span class="plus">+</span><span>追加</span></button>
  <button class="nav-btn" data-screen="analytics" type="button"><svg viewBox="0 0 24 24"><path d="M4 19V5"></path><path d="M4 19h17"></path><path d="m7 15 4-4 3 3 5-7"></path></svg><span>分析</span></button>
  <button class="nav-btn" data-screen="settings" type="button"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2 3.4-.2-.1a1.7 1.7 0 0 0-2 .2 1.7 1.7 0 0 0-.8 1.7V22H9.2v-.2a1.7 1.7 0 0 0-.8-1.7 1.7 1.7 0 0 0-2-.2l-.2.1-2-3.4.1-.1A1.7 1.7 0 0 0 4.6 15 1.7 1.7 0 0 0 3 14H2v-4h1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1 2-3.4.2.1a1.7 1.7 0 0 0 2-.2 1.7 1.7 0 0 0 .8-1.7V2h5.6v.2a1.7 1.7 0 0 0 .8 1.7 1.7 1.7 0 0 0 2 .2l.2-.1 2 3.4-.1.1a1.7 1.7 0 0 0-.3 1.9A1.7 1.7 0 0 0 21 10h1v4h-1a1.7 1.7 0 0 0-1.6 1z"></path></svg><span>設定</span></button>
</div></nav>
<div class="toast" id="toast"></div>
<div class="sheet-backdrop" id="sheetBackdrop"></div>

    help:`<h3>どんな動き？</h3><p>ベンチに仰向けに寝て、両手のダンベルを胸の上で押し上げる動きです。胸の筋肉をメインで鍛えます。</p>

const EXERCISES = EXERCISE_LIBRARY.map(e => e.name);
const USER_MENU_KEY = "muscle_log_menu_v1";
function loadUserMenu(){ try { return JSON.parse(localStorage.getItem(USER_MENU_KEY)) || []; } catch { return []; } }
function saveUserMenu(menu){ localStorage.setItem(USER_MENU_KEY, JSON.stringify(menu)); }
function getAllMenu(){ return [...EXERCISE_LIBRARY, ...loadUserMenu()]; }
function findExerciseInfo(name){ return getAllMenu().find(e => e.name === name); }

const REPS = [6,8,10,12,15,20,25];
const DOW = ["日","月","火","水","木","金","土"];
let state = { weight: 12, reps: 10, sets: 3, month: new Date(), activeDate: null, selectedMenu: null, analyticsMenu: null, charts: {} };
let cloudClient = null;
let cloudUser = null;
let cloudStatus = "local";
let cloudMessage = "";
let cloudSaveTimer = null;

function keyOf(date=new Date()){ return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`; }
// Use 4am as the day boundary so late-night workouts count as the previous day's record
function todayKey(){ const d = new Date(); if (d.getHours() < 4) d.setDate(d.getDate() - 1); return keyOf(d); }
function activeKey(){ return state.activeDate || todayKey(); }
function dateLabel(key){ const d = new Date(key+"T12:00:00"); return `${d.getMonth()+1}/${d.getDate()}(${DOW[d.getDay()]})`; }
function loadRecords(){ migrateLegacy(); try{return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []}catch{return []} }
function saveRecords(records){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  scheduleCloudSave(records);
}
function touchRecord(record){
  record.updatedAt = new Date().toISOString();
  return record;
}
function recordTime(record){
  return Date.parse(record.updatedAt || record.updated_at || record.date + "T00:00:00") || 0;
}
function mergeRecords(localRecords, cloudRecords){
  const byDate = new Map();
  [...cloudRecords, ...localRecords].forEach(record => {
    const current = byDate.get(record.date);
    if (!current || recordTime(record) >= recordTime(current)) byDate.set(record.date, record);
  });
  return [...byDate.values()].sort((a,b) => a.date.localeCompare(b.date));
}
function migrateLegacy(){
  if (localStorage.getItem(STORAGE_KEY) || !localStorage.getItem(LEGACY_KEY)) return;
  try{
    const legacy = JSON.parse(localStorage.getItem(LEGACY_KEY));
    const records = Object.entries(legacy).map(([date,data]) => {
      const exercises = Object.entries(data.exercises || {}).map(([id,ex]) => {
        const name = EXERCISES.find(n => id.includes(n)) || id.replaceAll("_"," ");
        const done = (ex.sets || []).filter(s => s.done);
        const base = done[0] || (ex.sets || [])[0] || { weight:0, reps:0 };
        return { name, weight:Number(base.weight)||0, reps:Number(base.reps)||0, sets:done.length || (ex.sets || []).length || 1 };
      });
      return touchRecord({ id:crypto.randomUUID(), date, memo:data.memo || "", exercises });
    }).filter(r => r.exercises.length);
    if (records.length) localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }catch{}
}
function getCloudClient(){
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY || !window.supabase) return null;
  if (!cloudClient) cloudClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth:{ persistSession:true, autoRefreshToken:true } });
  return cloudClient;
}
function cloudErrorMessage(error){
  const raw = String(error?.message || error || "");
  const code = String(error?.code || "");
  if (/Invalid login credentials/i.test(raw)) return "メールアドレスまたはパスワードが違います";
  if (/Email not confirmed/i.test(raw)) return "メール認証が未完了です。受信メールのリンクを開いてからログインしてください";
  if (/Failed to fetch|NetworkError|Load failed/i.test(raw)) return "Supabaseに接続できません。プロジェクトURLを確認してください";
  if (/42P01|relation .*does not exist/i.test(raw + code)) return "Supabase側の記録テーブルがまだ作成されていません";
  if (/row-level security|permission denied|42501/i.test(raw + code)) return "ログイン状態を確認してください（メール認証が未完了の可能性）";
  return raw || "同期に失敗しました";
}
function setCloudStatus(status, message=""){
  cloudStatus = status;
  cloudMessage = message;
  renderAuthPanel();
}
async function initCloud(){
  const client = getCloudClient();
  if (!client) { setCloudStatus("local"); return; }
  try {
    const { data:{ session } } = await client.auth.getSession();
    cloudUser = session?.user || null;
    if (cloudUser) {
      setCloudStatus("syncing");
      await pullCloudRecords();
      setCloudStatus("online");
    } else {
      setCloudStatus("local");
    }
    client.auth.onAuthStateChange(async (_event, session) => {
      cloudUser = session?.user || null;
      if (cloudUser) {
        try {
          setCloudStatus("syncing");
          await pullCloudRecords();
          setCloudStatus("online");
        } catch (e) {
          console.warn("Supabase auth sync failed", e);
          setCloudStatus("error", cloudErrorMessage(e));
        }
      } else {
        setCloudStatus("local");
      }
      refreshActiveScreen();
    });
  } catch (e) {
    console.warn("Supabase init failed", e);
    setCloudStatus("error", cloudErrorMessage(e));
  }
}
async function pullCloudRecords(){
  const client = getCloudClient();
  if (!client || !cloudUser) return;
  const { data, error } = await client
    .from("muscle_log_records")
    .select("id,record_date,memo,exercises,updated_at")
    .order("record_date", { ascending:true });
  if (error) { throw error; }
  const cloudRecords = (data || []).map(row => ({
    id: row.id,
    date: row.record_date,
    memo: row.memo || "",
    exercises: Array.isArray(row.exercises) ? row.exercises : [],
    updatedAt: row.updated_at || new Date().toISOString(),
  }));
  const localRecords = loadRecords();
  const merged = mergeRecords(localRecords, cloudRecords);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
  if (localRecords.length) await pushAllRecordsToCloud(merged);
  refreshActiveScreen();
}

async function pushAllRecordsToCloud(records = loadRecords()){
  const client = getCloudClient();

  setCloudStatus("syncing");
  const rows = records.map(record => ({
    user_id: cloudUser.id,
    record_date: record.date,
    memo: record.memo || "",
    exercises: record.exercises || [],
  }));
  if (!rows.length) { setCloudStatus("online"); return; }
  const { error } = await client
    .from("muscle_log_records")
    .upsert(rows, { onConflict:"user_id,record_date" });
  if (error) { setCloudStatus("error"); throw error; }
  setCloudStatus("online");
}

async function cloudAuth(mode){
  const email = document.getElementById("cloudEmail").value.trim();
  const password = document.getElementById("cloudPassword").value;
  if (!email || !password) { toast("メールアドレスとパスワードを入力してください"); return; }
  const client = getCloudClient();
  if (!client) { toast("Supabaseの読み込みに失敗しました"); return; }
  setCloudStatus("syncing");
  let result;
  try {
    result = mode === "signup"
      ? await client.auth.signUp({ email, password })
      : await client.auth.signInWithPassword({ email, password });
  } catch (e) {
    const message = cloudErrorMessage(e);
    setCloudStatus("error", message);
    toast(message);
    return;
  }
  if (result.error) { const message = cloudErrorMessage(result.error); setCloudStatus("error", message); toast(message); return; }
  // Only treat the user as logged in when a session is actually present.
  // signUp with email confirmation enabled returns data.user but no session.
  const session = result.data.session;
  cloudUser = session?.user || null;
  if (!cloudUser) {
    const message = mode === "signup"
      ? "確認メールを送りました。受信メールのリンクを開いてからログインしてください"
      : "ログインに失敗しました";
    setCloudStatus("local", message);
    toast(message);
    refreshActiveScreen();
    return;
  }
  try {
    await pushAllRecordsToCloud();
    await pullCloudRecords();
    setCloudStatus("online");
    toast(mode === "signup" ? "登録しました" : "ログインしました");
  } catch (e) {
    const message = cloudErrorMessage(e);
    setCloudStatus("error", message);
    toast(message);
  }
  refreshActiveScreen();
}

function bindWorkoutCardEdit(scope){
  scope.querySelectorAll("[data-edit]").forEach(card => {
    card.onclick = () => openExerciseEditor(card.dataset.editDate, Number(card.dataset.editIdx));
  });
}
function openExerciseEditor(date, idx){
  const record = loadRecords().find(r => r.date === date);
  const ex = record?.exercises?.[idx];
  if (!ex) return;
  editingTarget = { date, idx };
  document.getElementById("editName").value = ex.name;
  document.getElementById("editWeight").value = ex.weight;
  document.getElementById("editReps").value = ex.reps;
  document.getElementById("editSets").value = ex.sets;
  document.getElementById("editSheet").classList.add("open");
  document.getElementById("sheetBackdrop").classList.add("open");
  document.getElementById("editSheet").setAttribute("aria-hidden", "false");
}
function closeExerciseEditor(){
  editingTarget = null;
  document.getElementById("editSheet").classList.remove("open");
  document.getElementById("sheetBackdrop").classList.remove("open");
  document.getElementById("editSheet").setAttribute("aria-hidden", "true");
}
function applyExerciseEdit(){
  if (!editingTarget) return;
  const records = loadRecords();
  const record = records.find(r => r.date === editingTarget.date);
  const ex = record?.exercises?.[editingTarget.idx];
  if (!ex) return closeExerciseEditor();
  const name = document.getElementById("editName").value.trim() || ex.name;
  const weight = Math.max(0, Number(document.getElementById("editWeight").value) || 0);
  const reps = Math.max(1, Math.round(Number(document.getElementById("editReps").value) || 1));
  const sets = Math.max(1, Math.round(Number(document.getElementById("editSets").value) || 1));
  Object.assign(ex, { name, weight, reps, sets });
  touchRecord(record);
  saveRecords(records);
  closeExerciseEditor();
  toast("更新しました");
  refreshActiveScreen();
}
function deleteExerciseFromRecord(){
  if (!editingTarget) return;
  if (!confirm("この種目を削除しますか？")) return;
  const records = loadRecords();
  const recordIdx = records.findIndex(r => r.date === editingTarget.date);
  if (recordIdx < 0) return closeExerciseEditor();
  records[recordIdx].exercises.splice(editingTarget.idx, 1);
  if (!records[recordIdx].exercises.length) records.splice(recordIdx, 1);
  else touchRecord(records[recordIdx]);
  saveRecords(records);
  closeExerciseEditor();
  toast("削除しました");
  refreshActiveScreen();
}

document.querySelectorAll(".nav-btn").forEach(btn => btn.onclick = () => switchScreen(btn.dataset.screen));
document.querySelectorAll("[data-step-weight]").forEach(b => b.onclick = () => { state.weight = Math.max(0, +(state.weight + Number(b.dataset.stepWeight) * .5).toFixed(1)); renderNumberControls(); });
document.querySelectorAll("[data-step-reps]").forEach(b => b.onclick = () => { state.reps = Math.max(1, state.reps + Number(b.dataset.stepReps)); renderNumberControls(); });
document.getElementById("saveRecord").onclick = () => saveExercise();
document.getElementById("addAnother").onclick = () => saveExercise({stay:true});
document.getElementById("prevMonth").onclick = () => { state.month.setMonth(state.month.getMonth()-1); renderRecords(); };
document.getElementById("nextMonth").onclick = () => { state.month.setMonth(state.month.getMonth()+1); renderRecords(); };
document.getElementById("topAction").onclick = () => switchScreen("settings");
document.getElementById("sheetClose").onclick = closeExerciseEditor;
document.getElementById("helpSheetClose").onclick = closeExerciseHelp;
document.getElementById("addMenuClose").onclick = closeAddMenu;
document.getElementById("addMenuOpen").onclick = openAddMenu;
document.getElementById("addMenuSave").onclick = saveNewMenu;
document.getElementById("sheetBackdrop").onclick = () => { closeExerciseEditor(); closeExerciseHelp(); closeAddMenu(); };
document.getElementById("editSave").onclick = applyExerciseEdit;
document.getElementById("editDelete").onclick = deleteExerciseFromRecord;

switchScreen("home");
initCloud();
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
